<!--TO MAKE WEBSITE FOR KHUSHI'S STUDIO-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khushi' Studio</title>
    <link rel="stylesheet" href="mini_project_1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <input type="checkbox" id="checkbox">

    <div class="main_menu">
        <label for="checkbox"><i class="fa-solid fa-bars"></i></label>
    </div>

    <div class="slidebar">
        <h2 class="logo">Khushi's Studio</h2>
        <label for="checkbox" class="cross"><i class="fa-solid fa-x"></i></label>
        <hr>
        <ul class="option_list">
            <li class="options"><i class="fa-solid fa-image"></i> <a href="#">Gallery</a> </li>
            <li class="options"><i class="fa-solid fa-calendar-days"></i> <a href="#">Events</a> </li>
            <li class="options"><i class="fa-solid fa-store"></i> <a href="#">Store</a> </li>
            <li class="options"><i class="fa-solid fa-business-time"></i> <a href="#">Booking</a> </li>
            <li class="options"><i class="fa-solid fa-user"></i> <a href="#">Account</a> </li>
            <li class="options"><i class="fa-solid fa-phone"></i> <a href="#">Contact</a> </li>
            <li class="options"><i class="fa-solid fa-comments"></i> <a href="#">Feedback</a> </li>
        </ul>
        <div class="social_media">
            <ul>
                <li class="social_icon"><i class="fa-brands fa-youtube"></i></li>
                <li class="social_icon"><i class="fa-brands fa-square-instagram"></i></li>
                <li class="social_icon"><i class="fa-brands fa-facebook"></i></li>
                <li class="social_icon"><i class="fa-brands fa-linkedin"></i></li>
            </ul>
        </div>
    </div>
</body>

</html>
